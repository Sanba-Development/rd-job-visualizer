<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paleta de Colores — RD Job Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen transition-colors duration-300">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold">Paleta de Colores</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">RD Job Visualizer — 12 Sectores</p>
      </div>
      <button id="theme-toggle"
        class="flex items-center gap-2 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-medium">
        <i id="theme-icon-sun" data-lucide="sun" class="w-4 h-4 hidden dark:inline-block"></i>
        <i id="theme-icon-moon" data-lucide="moon" class="w-4 h-4 inline-block dark:hidden"></i>
        <span class="hidden sm:inline" id="theme-label">Modo Oscuro</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <p class="text-gray-600 dark:text-gray-400 mb-8 max-w-2xl">
      Colores asignados a cada sector económico del treemap. Basados en CIIU Rev.4 adaptados al contexto dominicano.
      Verifica el contraste del texto blanco y negro sobre cada color.
    </p>

    <div id="sectors-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards rendered by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 dark:border-gray-800 mt-12 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-500 dark:text-gray-400">
      <p>Sanba Development — RD Job Visualizer</p>
      <a href="../index.html" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center gap-1">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Volver al inicio
      </a>
    </div>
  </footer>

  <script>
    // Theme toggle
    const toggle = document.getElementById('theme-toggle');
    const label = document.getElementById('theme-label');
    const html = document.documentElement;

    function setTheme(dark) {
      if (dark) {
        html.classList.add('dark');
        html.classList.remove('light');
        label.textContent = 'Modo Claro';
      } else {
        html.classList.remove('dark');
        html.classList.add('light');
        label.textContent = 'Modo Oscuro';
      }
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    toggle.addEventListener('click', () => {
      setTheme(!html.classList.contains('dark'));
      lucide.createIcons();
    });

    // Restore saved theme
    if (localStorage.getItem('theme') === 'dark') {
      setTheme(true);
    }

    // Relative luminance for contrast calculation
    function luminance(hex) {
      const rgb = [
        parseInt(hex.slice(1, 3), 16) / 255,
        parseInt(hex.slice(3, 5), 16) / 255,
        parseInt(hex.slice(5, 7), 16) / 255,
      ].map(c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
      return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
    }

    function contrastRatio(hex1, hex2) {
      const l1 = luminance(hex1);
      const l2 = luminance(hex2);
      const lighter = Math.max(l1, l2);
      const darker = Math.min(l1, l2);
      return ((lighter + 0.05) / (darker + 0.05)).toFixed(2);
    }

    function wcagLevel(ratio) {
      if (ratio >= 7) return { label: 'AAA', cls: 'text-green-700 dark:text-green-400' };
      if (ratio >= 4.5) return { label: 'AA', cls: 'text-green-700 dark:text-green-400' };
      if (ratio >= 3) return { label: 'AA Large', cls: 'text-yellow-700 dark:text-yellow-400' };
      return { label: 'Fail', cls: 'text-red-700 dark:text-red-400' };
    }

    // Load sectors and render
    fetch('sector-colors.json')
      .then(r => r.json())
      .then(sectors => {
        const grid = document.getElementById('sectors-grid');

        sectors.forEach((s, i) => {
          const whiteRatio = contrastRatio(s.color, '#FFFFFF');
          const blackRatio = contrastRatio(s.color, '#000000');
          const whiteWcag = wcagLevel(whiteRatio);
          const blackWcag = wcagLevel(blackRatio);

          const card = document.createElement('div');
          card.className = 'bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm hover:shadow-md transition-shadow';
          card.innerHTML = `
            <!-- Color swatch -->
            <div class="h-32 flex items-center justify-center relative" style="background-color: ${s.color}">
              <i data-lucide="${s.icon}" class="w-12 h-12 text-white opacity-90"></i>
              <span class="absolute top-2 right-2 text-xs font-mono px-2 py-0.5 rounded bg-black/20 text-white">${s.color}</span>
              <span class="absolute top-2 left-2 text-xs font-bold px-2 py-0.5 rounded bg-black/20 text-white">CIIU ${s.ciiu}</span>
            </div>

            <!-- Sector info -->
            <div class="p-4">
              <h3 class="font-bold text-base mb-0.5">${s.name}</h3>
              <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">
                <span class="font-mono text-xs bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded">${s.id}</span>
                &middot; ${s.shortName}
              </p>

              <!-- Contrast check -->
              <div class="space-y-2">
                <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Contraste</p>
                <div class="flex gap-2">
                  <div class="flex-1 rounded-lg px-3 py-2 text-center text-sm font-bold text-white" style="background-color: ${s.color}">
                    Blanco
                    <span class="block text-xs font-normal opacity-90 mt-0.5">${whiteRatio}:1 <span class="${whiteWcag.cls}">${whiteWcag.label}</span></span>
                  </div>
                  <div class="flex-1 rounded-lg px-3 py-2 text-center text-sm font-bold text-black" style="background-color: ${s.color}">
                    Negro
                    <span class="block text-xs font-normal opacity-90 mt-0.5">${blackRatio}:1 <span class="${blackWcag.cls}">${blackWcag.label}</span></span>
                  </div>
                </div>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        // Render Lucide icons after DOM update
        lucide.createIcons();
      })
      .catch(err => {
        document.getElementById('sectors-grid').innerHTML = `
          <div class="col-span-full text-center py-12 text-red-500">
            <p class="font-bold">Error cargando sector-colors.json</p>
            <p class="text-sm mt-2">${err.message}</p>
          </div>`;
      });
  </script>
</body>
</html>
